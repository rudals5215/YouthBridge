spring.application.name=YouthBridge

# ── DB 연결 (Supabase PostgreSQL) ─────────────────
# 로컬 개발: DB_URL에 로컬 PostgreSQL 또는 Supabase URL 설정
spring.datasource.url=jdbc:postgresql://db.yflxrfwisanqaonlmxzd.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=starex8674!??
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA 설정 ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Swagger UI ───────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html

# ── 파일 업로드 ──────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── JWT ─────────────────────────────────────────
jwt.secret=${JWT_SECRET:youthbridge-jwt-secret-key-must-be-at-least-32-characters-long}
jwt.expiration=86400000

# ── 카카오 소셜 로그인 ───────────────────────────
