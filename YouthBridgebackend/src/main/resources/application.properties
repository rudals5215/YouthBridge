spring.application.name=YouthBridge

# ?? DB ?? (Supabase PostgreSQL) ?????????????????
# ?? ??: DB_URL? ?? PostgreSQL ?? Supabase URL ??
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/youthbridge}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA ?? ?????????????????????????????????????
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# PostgreSQL? ???? ?? ? ???/??? ??? ??
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# ?? Swagger UI ???????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html

# ?? ?? ??? ??????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ?? JWT ?????????????????????????????????????????
jwt.secret=${JWT_SECRET:youthbridge-secret-key-must-be-at-least-32-characters-long}
jwt.expiration=86400000

