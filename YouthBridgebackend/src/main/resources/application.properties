spring.application.name=YouthBridge

# ── DB 연결 ──────────────────────────────────────
# MariaDB 드라이버로 통일 (build.gradle도 같이 수정 필요)
spring.datasource.url=jdbc:mariadb://localhost:3302/youthbridge
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA 설정 ─────────────────────────────────────
# create-drop → update 로 변경
# create-drop: 서버 끄면 테이블 전부 삭제됨 (위험!)
# update: 테이블이 없으면 생성, 있으면 유지
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ── Swagger UI ───────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html

# ── 파일 업로드 ──────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── JWT 설정 (나중에 실제 값으로 교체) ─────────────
jwt.secret=youthbridge-secret-key-must-be-at-least-32-characters-long
jwt.expiration=86400000

# ── 카카오 소셜 로그인 ───────────────────────────────
kakao.client-id=2a20189772741d8f70c47c384207ec5b
kakao.redirect-uri=http://localhost:5173/oauth/kakao

# ── 온통청년 공공 API ────────────────────────────────────
youth.api.key=3fa7f900-ae42-4b8b-aeda-6428212969f3
